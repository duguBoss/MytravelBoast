<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TravelBoast — 创建你的旅行路线动画</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: rgba(255,255,255,0.92);
      --surface-solid: #ffffff;
      --fg: #1a1d2b;
      --muted: #6b7089;
      --border: rgba(228,230,239,0.8);
      --accent: #ff6b4a;
      --accent-hover: #e85a3a;
      --accent-light: #fff0ec;
      --accent-glow: rgba(255,107,74,0.2);
      --success: #34c759;
      --warning: #ff9500;
      --map-bg: #dfe3e8;
      --shadow-sm: 0 1px 3px rgba(26,29,43,0.06);
      --shadow-md: 0 4px 20px rgba(26,29,43,0.08);
      --shadow-lg: 0 12px 40px rgba(26,29,43,0.12);
      --shadow-xl: 0 24px 60px rgba(26,29,43,0.18);
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-xl: 24px;
      --font-display: 'Space Grotesk', -apple-system, system-ui, sans-serif;
      --font-body: 'DM Sans', -apple-system, system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: var(--map-bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== FULLSCREEN MAP ========== */
    #map {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
    }

    /* ========== GLASSMORPHISM PANELS ========== */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
    }

    /* ========== TOP BAR ========== */
    .topbar {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: var(--radius-xl);
      z-index: 100;
      max-width: 92vw;
      overflow: hidden;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-display);
      font-weight: 700; font-size: 16px;
      letter-spacing: -0.02em;
      padding: 0 6px;
      white-space: nowrap;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: grid; place-items: center;
      color: #fff; font-size: 14px;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .topbar-divider {
      width: 1px; height: 24px;
      background: var(--border);
      flex-shrink: 0;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px;
      height: 36px;
      padding: 0 14px;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      background: transparent;
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn:hover { background: rgba(0,0,0,0.04); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-icon {
      width: 36px; padding: 0;
    }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ========== LEFT PANEL (ROUTE) ========== */
    .left-panel {
      position: fixed;
      top: 72px; left: 16px;
      width: 300px;
      max-height: calc(100vh - 280px);
      border-radius: var(--radius-lg);
      z-index: 100;
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .panel-header {
      padding: 14px 16px 10px;
      font-family: var(--font-display);
      font-weight: 600; font-size: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-sub {
      font-size: 11px; color: var(--muted);
      font-weight: 500;
      font-family: var(--font-body);
    }
    .route-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px;
      scrollbar-width: thin;
    }
    .route-scroll::-webkit-scrollbar { width: 4px; }
    .route-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .route-node {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-md);
      margin-bottom: 2px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid transparent;
      position: relative;
    }
    .route-node:hover { background: rgba(0,0,0,0.03); }
    .route-node.active {
      background: var(--accent-light);
      border-color: rgba(255,107,74,0.12);
    }
    .node-pin {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 10px; font-weight: 700;
      color: #fff; flex-shrink: 0;
      border: 2px solid #fff;
      box-shadow: var(--shadow-sm);
    }
    .node-pin.start { background: var(--success); }
    .node-pin.end { background: var(--accent); }
    .node-pin.stop { background: var(--muted); }
    .node-info { flex: 1; min-width: 0; }
    .node-name {
      font-weight: 600; font-size: 13px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .node-meta {
      font-size: 10px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .node-vehicle {
      font-size: 18px;
      opacity: 0.7;
      transition: transform 0.2s;
    }
    .route-node:hover .node-vehicle { transform: scale(1.2); opacity: 1; }

    .segment-row {
      display: flex; align-items: center;
      padding: 2px 0 2px 22px;
      position: relative;
    }
    .segment-row::before {
      content: '';
      position: absolute;
      left: 18px; top: -4px; bottom: -4px;
      width: 2px;
      background: repeating-linear-gradient(to bottom, var(--border) 0, var(--border) 4px, transparent 4px, transparent 8px);
    }
    .segment-vehicle {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      font-size: 11px; font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .segment-vehicle:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }
    .segment-vehicle .seg-icon { font-size: 14px; }
    .segment-dist {
      font-size: 10px; color: var(--muted);
      margin-left: auto; padding-left: 8px;
    }

    .panel-footer {
      padding: 10px;
      border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .panel-footer .btn { flex: 1; font-size: 12px; height: 32px; }

    /* ========== BOTTOM PANEL (VEHICLES) ========== */
    .bottom-panel {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      width: auto; max-width: 92vw;
      border-radius: var(--radius-lg);
      z-index: 100;
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .vehicle-tabs {
      display: flex; gap: 2px;
      padding: 8px 12px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .vehicle-tabs::-webkit-scrollbar { display: none; }
    .vtab {
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .vtab:hover { color: var(--fg); background: rgba(0,0,0,0.03); }
    .vtab.active { color: var(--fg); background: rgba(0,0,0,0.05); }

    .vehicle-grid {
      display: flex; gap: 6px;
      padding: 8px 12px 12px;
      overflow-x: auto;
      scrollbar-width: thin;
      max-width: 800px;
    }
    .vehicle-grid::-webkit-scrollbar { height: 4px; }
    .vehicle-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .vcard {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px;
      min-width: 64px; max-width: 64px;
      padding: 8px 4px;
      border-radius: var(--radius-md);
      border: 1.5px solid transparent;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }
    .vcard:hover {
      background: rgba(0,0,0,0.03);
      transform: translateY(-3px);
    }
    .vcard.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .vcard .vc-icon {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      font-size: 22px;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .vcard:hover .vc-icon { transform: scale(1.2); }
    .vcard.selected .vc-icon { transform: scale(1.15); }
    .vcard .vc-name {
      font-size: 9px; font-weight: 600;
      color: var(--muted);
      text-align: center;
      line-height: 1.2;
      max-width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vcard.selected .vc-name { color: var(--accent); }
    .vcard .vc-check {
      position: absolute;
      top: 4px; right: 4px;
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      display: none; place-items: center;
    }
    .vcard.selected .vc-check { display: grid; }
    .vc-check svg { width: 8px; height: 8px; color: #fff; }

    /* ========== SETTINGS PANEL ========== */
    .settings-drawer {
      position: fixed;
      top: 16px; right: 16px;
      width: 300px; max-height: calc(100vh - 32px);
      border-radius: var(--radius-lg);
      z-index: 200;
      display: none; flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: translateX(20px);
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .settings-drawer.show {
      display: flex;
      opacity: 1;
      transform: translateX(0);
    }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      scrollbar-width: thin;
    }
    .drawer-body::-webkit-scrollbar { width: 4px; }
    .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .s-row { margin-bottom: 16px; }
    .s-label {
      display: block;
      font-weight: 600; font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .s-pills {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .pill {
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill:hover { border-color: var(--muted); }
    .pill.active {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }
    .s-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-track {
      width: 44px; height: 24px;
      border-radius: 12px;
      background: var(--border);
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s;
    }
    .toggle-track.on { background: var(--accent); }
    .toggle-track.on::after { transform: translateX(20px); }

    /* ========== PLAY OVERLAY ========== */
    .play-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: none;
      pointer-events: none;
    }
    .play-overlay.show { display: block; pointer-events: auto; }
    .play-hud {
      position: absolute;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      padding: 8px 18px;
      border-radius: var(--radius-xl);
      z-index: 10;
      font-family: var(--font-display);
      font-weight: 600; font-size: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .play-hud .hud-vehicle { font-size: 20px; }
    .play-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow-md);
      display: grid; place-items: center;
      cursor: pointer;
      z-index: 10;
      color: var(--fg);
    }
    .play-progress {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      width: 320px; max-width: 80vw;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      overflow: hidden;
      z-index: 10;
    }
    .play-progress-bar {
      height: 100%; width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    /* ========== EXPORT MODAL ========== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 600;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .modal-backdrop.show {
      display: flex;
      opacity: 1;
    }
    .modal-card {
      width: 90vw; max-width: 400px;
      background: var(--surface-solid);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: var(--shadow-xl);
      transform: scale(0.95);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .modal-backdrop.show .modal-card {
      transform: scale(1);
    }
    .modal-title {
      font-family: var(--font-display);
      font-weight: 700; font-size: 18px;
      text-align: center;
      margin-bottom: 4px;
    }
    .modal-desc {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 20px;
    }
    .preview-frame {
      width: 100%;
      aspect-ratio: 9/16;
      background: var(--bg);
      border-radius: var(--radius-md);
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .preview-frame.landscape { aspect-ratio: 16/9; }
    .preview-frame.square { aspect-ratio: 1/1; }
    .preview-map {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #e8ecf1 0%, #cdd5e0 50%, #b8c4d4 100%);
    }
    .preview-route {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
    }
    .preview-vehicle {
      position: absolute;
      font-size: 36px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.2));
    }
    .export-progress {
      width: 100%; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .export-progress-bar {
      height: 100%; width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s linear;
    }
    .modal-actions {
      display: flex; gap: 8px;
    }
    .modal-actions .btn { flex: 1; }

    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      bottom: 200px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--fg);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      z-index: 700;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ========== LEAFLET CUSTOM ========== */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: var(--shadow-md) !important;
      border-radius: var(--radius-md) !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      width: 32px !important; height: 32px !important;
      line-height: 32px !important;
      border: none !important;
      color: var(--fg) !important;
      font-size: 16px !important;
    }
    .leaflet-control-zoom a:hover { background: var(--bg) !important; }
    .leaflet-control-attribution { font-size: 9px !important; opacity: 0.5; }

    /* Custom markers */
    .map-pin {
      display: flex; flex-direction: column; align-items: center;
    }
    .map-pin-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-weight: 700; font-size: 12px;
      color: #fff;
      border: 3px solid #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      font-family: var(--font-display);
    }
    .map-pin-dot.start { background: var(--success); }
    .map-pin-dot.end { background: var(--accent); }
    .map-pin-dot.stop { background: var(--muted); }
    .map-pin-flag {
      margin-top: 2px;
      font-size: 16px;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.15));
    }
    .map-pin-label {
      margin-top: 2px;
      background: rgba(255,255,255,0.95);
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px; font-weight: 600;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      white-space: nowrap;
    }

    .distance-label {
      background: var(--surface-solid);
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 11px; font-weight: 600;
      color: var(--accent);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* Animated vehicle on map */
    .moving-vehicle {
      font-size: 28px;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.3));
      z-index: 1000 !important;
      transition: none;
    }

    /* ========== MOBILE ========== */
    @media (max-width: 768px) {
      .left-panel {
        width: 260px;
        top: 68px;
        transform: translateX(-120%);
      }
      .left-panel.open { transform: translateX(0); }
      .bottom-panel { max-width: 96vw; }
      .vehicle-grid { max-width: 90vw; }
      .settings-drawer {
        width: calc(100vw - 32px);
        top: auto; bottom: 16px; right: 16px;
        max-height: 70vh;
        transform: translateY(20px);
      }
      .settings-drawer.show { transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- TOP BAR -->
  <div class="topbar glass">
    <div class="logo">
      <div class="logo-icon">✈</div>
      <span>TravelBoast</span>
    </div>
    <div class="topbar-divider"></div>
    <button class="btn btn-icon" id="btn-menu" title="路线">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <button class="btn btn-icon" id="btn-settings-top" title="设置">

  <!-- TOAST -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>

    // ========== DATA ==========
    const vehicles = [
      { id: 'plane', name: '飞机', icon: '✈️', cat: 'air' },
      { id: 'helicopter', name: '直升机', icon: '🚁', cat: 'air' },
      { id: 'rocket', name: '火箭', icon: '🚀', cat: 'air' },
      { id: 'ufo', name: '飞碟', icon: '🛸', cat: 'air' },
      { id: 'balloon', name: '热气球', icon: '🎈', cat: 'air' },
      { id: 'paraglider', name: '滑翔伞', icon: '🪂', cat: 'air' },
      { id: 'car', name: '汽车', icon: '🚗', cat: 'ground' },
      { id: 'taxi', name: '出租车', icon: '🚕', cat: 'ground' },
      { id: 'bus', name: '巴士', icon: '🚌', cat: 'ground' },
      { id: 'van', name: '面包车', icon: '🚐', cat: 'ground' },
      { id: 'motorcycle', name: '摩托车', icon: '🏍️', cat: 'ground' },
      { id: 'bike', name: '自行车', icon: '🚲', cat: 'ground' },
      { id: 'scooter', name: '滑板车', icon: '🛴', cat: 'ground' },
      { id: 'truck', name: '卡车', icon: '🚚', cat: 'ground' },
      { id: 'jeep', name: '吉普', icon: '🚙', cat: 'ground' },
      { id: 'ambulance', name: '救护车', icon: '🚑', cat: 'ground' },
      { id: 'firetruck', name: '消防车', icon: '🚒', cat: 'ground' },
      { id: 'police', name: '警车', icon: '🚓', cat: 'ground' },
      { id: 'tractor', name: '拖拉机', icon: '🚜', cat: 'ground' },
      { id: 'ship', name: '轮船', icon: '🚢', cat: 'water' },
      { id: 'boat', name: '帆船', icon: '⛵', cat: 'water' },
      { id: 'speedboat', name: '快艇', icon: '🚤', cat: 'water' },
      { id: 'cruise', name: '邮轮', icon: '🛳️', cat: 'water' },
      { id: 'canoe', name: '独木舟', icon: '🛶', cat: 'water' },
      { id: 'train', name: '火车', icon: '🚂', cat: 'rail' },
      { id: 'metro', name: '地铁', icon: '🚇', cat: 'rail' },
      { id: 'tram', name: '电车', icon: '🚊', cat: 'rail' },
      { id: 'bullet', name: '高铁', icon: '🚄', cat: 'rail' },
      { id: 'monorail', name: '单轨', icon: '🚝', cat: 'rail' },
      { id: 'lightrail', name: '轻轨', icon: '🚈', cat: 'rail' },
      { id: 'dragon', name: '飞龙', icon: '🐉', cat: 'fun' },
      { id: 'unicorn', name: '独角兽', icon: '🦄', cat: 'fun' },
      { id: 'sleigh', name: '雪橇', icon: '🛷', cat: 'fun' },
      { id: 'magic', name: '精灵', icon: '🧞', cat: 'fun' },
      { id: 'ghost', name: '幽灵', icon: '👻', cat: 'fun' },
      { id: 'alien', name: '外星人', icon: '👽', cat: 'fun' },
      { id: 'robot', name: '机器人', icon: '🤖', cat: 'fun' },
      { id: 'crown', name: '王冠', icon: '👑', cat: 'fun' },
    ];

    const countryFlags = {
      '北京': '🇨🇳', '上海': '🇨🇳', '广州': '🇨🇳', '深圳': '🇨🇳',
      '成都': '🇨🇳', '杭州': '🇨🇳', '西安': '🇨🇳', '重庆': '🇨🇳',
      '武汉': '🇨🇳', '南京': '🇨🇳', '东京': '🇯🇵', '大阪': '🇯🇵',
      '纽约': '🇺🇸', '洛杉矶': '🇺🇸', '伦敦': '🇬🇧', '巴黎': '🇫🇷',
      '柏林': '🇩🇪', '罗马': '🇮🇹', '悉尼': '🇦🇺', '莫斯科': '🇷🇺',
      '首尔': '🇰🇷', '曼谷': '🇹🇭', '新加坡': '🇸🇬', '迪拜': '🇦🇪',
    };

    // ========== STATE ==========
    let selVehicle = vehicles[0];
    let selSegment = 0;
    let points = [
      { id: 'p1', name: '北京', lat: 39.9042, lng: 116.4074, type: 'start' },
      { id: 'p2', name: '东京', lat: 35.6762, lng: 139.6503, type: 'end' }
    ];
    let segments = [{ vehicle: vehicles[0], distance: 0 }];
    let settings = {
      ratio: 'vertical', speed: 1, size: 'medium',
      mapStyle: 'voyager', showDistance: true,
      showFlags: false, use3D: true, showLabels: true
    };
    let map, routeLine, distMarkers = [], pinMarkers = [];
    let animFrame, isPlaying = false, isExporting = false;
    let mapTiles;

    // ========== UTILS ==========
    function $(s) { return document.querySelector(s); }
    function $$(s) { return document.querySelectorAll(s); }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }
    function toast(msg) {
      const t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }
    function haversine(lat1, lng1, lat2, lng2) {
      const R = 6371, toRad = Math.PI / 180;
      const dLat = (lat2 - lat1) * toRad, dLng = (lng2 - lng1) * toRad;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.sin(dLng/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    function getFlag(name) { return countryFlags[name] || '📍'; }

    // ========== MAP ==========
    const tileUrls = {
      voyager: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
      dark: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
      satellite: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      minimal: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
    };
    const attribution = '&copy; OSM &copy; CARTO';

    function initMap() {
      map = L.map('map', { zoomControl: false }).setView([37.5, 128], 4);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      mapTiles = L.tileLayer(tileUrls.voyager, { attribution, maxZoom: 19 }).addTo(map);
      map.on('click', (e) => {
        if (isPlaying || isExporting || map._addingStop) return;
        addPoint(e.latlng.lat, e.latlng.lng);
      });
      renderRoute();
    }

    // ========== ROUTE ==========
    function addPoint(lat, lng, name) {
      const nm = name || ('途经点 ' + (points.length - 1));
      const np = { id: uid(), name: nm, lat, lng, type: 'stop' };
      points.splice(points.length - 1, 0, np);
      syncSegments();
      renderRoute();
      toast('已添加：' + nm);
    }
    function removePoint(id) {
      if (points.length <= 2) { toast('至少保留起点和终点'); return; }
      points = points.filter(p => p.id !== id);
      syncSegments();
      renderRoute();
    }
    function syncSegments() {
      const newSegs = [];
      for (let i = 0; i < points.length - 1; i++) {
        const v = (segments[i] && segments[i].vehicle) || selVehicle;
        newSegs.push({ vehicle: v, distance: 0 });
      }
      segments = newSegs;
    }
    function updateDistances() {
      let total = 0;
      segments.forEach((s, i) => {
        const d = haversine(points[i].lat, points[i].lng, points[i+1].lat, points[i+1].lng);
        s.distance = d;
        total += d;
      });
      $('#total-dist').textContent = total.toFixed(0) + ' km';
    }

    function renderRoute() {
      pinMarkers.forEach(m => map.removeLayer(m));
      pinMarkers = [];
      distMarkers.forEach(m => map.removeLayer(m));
      distMarkers = [];

      points.forEach((p, i) => {
        const isS = i === 0, isE = i === points.length - 1;
        const color = isS ? '#34c759' : isE ? '#ff6b4a' : '#6b7089';
        const label = isS ? 'A' : isE ? 'B' : String(i);
        const flag = settings.showFlags ? getFlag(p.name) : '';
        const nameLabel = settings.showLabels ? p.name : '';

        const html = `
          <div class="map-pin">
            <div class="map-pin-dot ${isS?'start':isE?'end':'stop'}">${label}</div>
            ${flag ? `<div class="map-pin-flag">${flag}</div>` : ''}
            ${nameLabel ? `<div class="map-pin-label">${nameLabel}</div>` : ''}
          </div>`;
        const icon = L.divIcon({ html, className: '', iconSize: [40, 56], iconAnchor: [20, 48] });
        const m = L.marker([p.lat, p.lng], { icon, draggable: !isPlaying }).addTo(map);
        m.on('dragend', (e) => {
          const ll = e.target.getLatLng();
          p.lat = ll.lat; p.lng = ll.lng;
          renderRouteLine(); updateDistances(); renderRouteList();
        });
        pinMarkers.push(m);
      });

      renderRouteLine();
      updateDistances();
      renderRouteList();
      fitRoute();
      renderDistLabels();
    }

    function renderRouteLine() {
      if (routeLine) map.removeLayer(routeLine);
      const latlngs = points.map(p => [p.lat, p.lng]);
      routeLine = L.polyline(latlngs, {
        color: '#ff6b4a', weight: 4, opacity: 0.85,
        lineCap: 'round', lineJoin: 'round'
      }).addTo(map);
    }

    function renderDistLabels() {
      if (!settings.showDistance) return;
      for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i], p2 = points[i+1];
        const lat = (p1.lat + p2.lat) / 2, lng = (p1.lng + p2.lng) / 2;
        const html = `<div class="distance-label">${segments[i].distance.toFixed(0)} km</div>`;
        const icon = L.divIcon({ html, className: '', iconSize: [80, 20], iconAnchor: [40, 10] });
        distMarkers.push(L.marker([lat, lng], { icon, interactive: false }).addTo(map));
      }
    }

    function fitRoute() {
      if (points.length < 2) return;
      const group = new L.featureGroup(pinMarkers);
      map.fitBounds(group.getBounds().pad(0.12));
    }

    // ========== SIDEBAR LIST ==========
    function renderRouteList() {
      const list = $('#route-list');
      list.innerHTML = '';

      points.forEach((p, i) => {
        const isS = i === 0, isE = i === points.length - 1;
        const type = isS ? '起点' : isE ? '终点' : '途经点';
        const cls = isS ? 'start' : isE ? 'end' : 'stop';
        const lbl = isS ? 'A' : isE ? 'B' : String(i);
        const v = (segments[i] && segments[i].vehicle) || selVehicle;

        const node = document.createElement('div');
        node.className = 'route-node' + (selSegment === i ? ' active' : '');
        node.innerHTML = `
          <div class="node-pin ${cls}">${lbl}</div>
          <div class="node-info">
            <div class="node-name">${p.name}</div>
            <div class="node-meta">${type} · ${p.lat.toFixed(2)}, ${p.lng.toFixed(2)}</div>
          </div>
          ${(!isS && !isE) ? `<button class="btn btn-icon route-del" data-id="${p.id}" style="width:24px;height:24px;opacity:0;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>` : ''}
          <div class="node-vehicle">${v.icon}</div>
        `;
        node.addEventListener('click', () => {
          selSegment = i;
          map.flyTo([p.lat, p.lng], 10, { duration: 0.8 });
          renderRouteList();
        });
        const del = node.querySelector('.route-del');
        if (del) {
          del.addEventListener('click', (e) => { e.stopPropagation(); removePoint(p.id); });
          node.addEventListener('mouseenter', () => del.style.opacity = '1');
          node.addEventListener('mouseleave', () => del.style.opacity = '0');
        }
        list.appendChild(node);

        // Segment row
        if (i < points.length - 1) {
          const seg = segments[i];
          const segRow = document.createElement('div');
          segRow.className = 'segment-row';
          segRow.innerHTML = `
            <div class="segment-vehicle" data-seg="${i}">
              <span class="seg-icon">${seg.vehicle.icon}</span>
              <span>${seg.vehicle.name}</span>
            </div>
            <span class="segment-dist">${seg.distance.toFixed(0)} km</span>
          `;
          segRow.querySelector('.segment-vehicle').addEventListener('click', () => {
            selSegment = i;
            segments[i].vehicle = selVehicle;
            renderRouteList();
            toast('路段 ' + (i+1) + ' 交通工具已更新');
          });
          list.appendChild(segRow);
        }
      });
    }

    // ========== VEHICLE SELECTOR ==========
    function renderVehicles(cat) {
      const grid = $('#vehicle-grid');
      grid.innerHTML = '';
      const filtered = cat === 'all' ? vehicles : vehicles.filter(v => v.cat === cat);
      filtered.forEach(v => {
        const card = document.createElement('div');
        card.className = 'vcard' + (selVehicle.id === v.id ? ' selected' : '');
        card.innerHTML = `
          <div class="vc-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="vc-icon">${v.icon}</div>
          <div class="vc-name">${v.name}</div>
        `;
        card.addEventListener('click', () => {
          selVehicle = v;
          if (segments[selSegment]) segments[selSegment].vehicle = v;
          renderVehicles(cat);
          renderRouteList();
          toast('已选择：' + v.name);
        });
        grid.appendChild(card);
      });
    }

    $$('.vtab').forEach(tab => {
      tab.addEventListener('click', () => {
        $$('.vtab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderVehicles(tab.dataset.cat);
      });
    });

    // ========== SETTINGS ==========
    function openSettings() { $('#settings-drawer').classList.add('show'); }
    function closeSettings() { $('#settings-drawer').classList.remove('show'); }
    $('#btn-settings-top').addEventListener('click', openSettings);
    $('#btn-close-settings').addEventListener('click', closeSettings);

    $$('.pill[data-opt]').forEach(btn => {
      btn.addEventListener('click', () => {
        const opt = btn.dataset.opt;
        $$(`.pill[data-opt="${opt}"]`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const val = btn.dataset.val;
        if (opt === 'ratio') { settings.ratio = val; }
        else if (opt === 'speed') { settings.speed = parseFloat(val); }
        else if (opt === 'size') { settings.size = val; }
        else if (opt === 'map') {
          settings.mapStyle = val;
          if (mapTiles) map.removeLayer(mapTiles);
          const attr = val === 'satellite' ? '&copy; Esri' : attribution;
          mapTiles = L.tileLayer(tileUrls[val], { attribution: attr, maxZoom: 19 }).addTo(map);
        }
      });
    });

    $$('.toggle-track[data-opt="toggle"]').forEach(t => {
      t.addEventListener('click', () => {
        t.classList.toggle('on');
        settings[t.dataset.key] = t.classList.contains('on');
        if (t.dataset.key === 'showDistance' || t.dataset.key === 'showFlags' || t.dataset.key === 'showLabels') {
          renderRoute();
        }
      });
    });

    // ========== PLAY ANIMATION ON MAP ==========
    $('#btn-play').addEventListener('click', () => {
      if (points.length < 2) { toast('请至少设置起点和终点'); return; }
      startMapAnimation();
    });

    function startMapAnimation() {
      isPlaying = true;
      $('#play-overlay').classList.add('show');
      $('#hud-vehicle').textContent = segments[0].vehicle.icon;
      $('#hud-text').textContent = segments[0].vehicle.name + ' · 出发';

      const totalDist = segments.reduce((s, seg) => s + seg.distance, 0);
      const duration = (totalDist * 80) / settings.speed;
      const startTime = performance.now();

      let movingMarker = null;

      function moveVehicle(t) {
        const elapsed = t - startTime;
        const progress = Math.min(elapsed / duration, 1);
        $('#play-progress-bar').style.width = (progress * 100) + '%';

        // Find current position along route
        const distCovered = totalDist * progress;
        let acc = 0;
        let segIdx = 0, segProgress = 0;
        for (let i = 0; i < segments.length; i++) {
          if (acc + segments[i].distance >= distCovered) {
            segIdx = i;
            segProgress = segments[i].distance > 0 ? (distCovered - acc) / segments[i].distance : 0;
            break;
          }
          acc += segments[i].distance;
        }
        if (segIdx >= segments.length) { segIdx = segments.length - 1; segProgress = 1; }

        const p1 = points[segIdx], p2 = points[segIdx + 1];
        const lat = p1.lat + (p2.lat - p1.lat) * segProgress;
        const lng = p1.lng + (p2.lng - p1.lng) * segProgress;

        if (!movingMarker) {
          const html = `<div class="moving-vehicle">${segments[segIdx].vehicle.icon}</div>`;
          const icon = L.divIcon({ html, className: '', iconSize: [36, 36], iconAnchor: [18, 18] });
          movingMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
        } else {
          movingMarker.setLatLng([lat, lng]);
          movingMarker.getElement().querySelector('.moving-vehicle').textContent = segments[segIdx].vehicle.icon;
        }

        $('#hud-vehicle').textContent = segments[segIdx].vehicle.icon;
        $('#hud-text').textContent = segments[segIdx].vehicle.name + ' · ' + p2.name;

        // Pan map to follow vehicle
        map.panTo([lat, lng], { animate: true, duration: 0.1 });

        if (progress < 1) {
          animFrame = requestAnimationFrame(moveVehicle);
        } else {
          setTimeout(() => stopMapAnimation(), 800);
          toast('动画播放完成');
        }
      }

      animFrame = requestAnimationFrame(moveVehicle);
    }

    function stopMapAnimation() {
      isPlaying = false;
      $('#play-overlay').classList.remove('show');
      $('#play-progress-bar').style.width = '0%';
      if (animFrame) cancelAnimationFrame(animFrame);
      // Remove moving marker by finding it
      map.eachLayer((layer) => {
        if (layer instanceof L.Marker && layer.getElement() && layer.getElement().querySelector('.moving-vehicle')) {
          map.removeLayer(layer);
        }
      });
    }

    $('#btn-stop-play').addEventListener('click', stopMapAnimation);

    // ========== EXPORT ==========
    $('#btn-export').addEventListener('click', () => {
      if (points.length < 2) { toast('请至少设置起点和终点'); return; }
      startExport();
    });

    function startExport() {
      isExporting = true;
      const modal = $('#export-modal');
      const frame = $('#preview-frame');
      const vehicle = $('#preview-vehicle');
      const bar = $('#export-progress-bar');
      const saveBtn = $('#btn-save-export');

      frame.className = 'preview-frame' + (settings.ratio === 'horizontal' ? ' landscape' : settings.ratio === 'square' ? ' square' : '');
      vehicle.textContent = segments[0].vehicle.icon;
      modal.classList.add('show');
      saveBtn.disabled = true;
      bar.style.width = '0%';

      // Animate vehicle along SVG path
      const path = document.getElementById('preview-path');
      const len = path.getTotalLength();
      let prog = 0;
      const dur = 3000 / settings.speed;
      const t0 = performance.now();

      function step(t) {
        const e = t - t0;
        prog = Math.min(e / dur, 1);
        bar.style.width = (prog * 100) + '%';

        const pt = path.getPointAtLength(len * prog);
        vehicle.style.left = (pt.x / 400 * 100) + '%';
        vehicle.style.top = (pt.y / 700 * 100) + '%';

        if (prog < 1) {
          requestAnimationFrame(step);
        } else {
          saveBtn.disabled = false;
          toast('视频生成完成');
          isExporting = false;
        }
      }
      requestAnimationFrame(step);
    }

    $('#btn-cancel-export').addEventListener('click', () => {
      $('#export-modal').classList.remove('show');
      isExporting = false;
    });

    $('#btn-save-export').addEventListener('click', () => {
      $('#export-modal').classList.remove('show');
      toast('视频已保存到相册');
    });

    // ========== SIDEBAR ACTIONS ==========
    $('#btn-add-stop').addEventListener('click', () => {
      toast('点击地图添加途经点');
      map._addingStop = true;
      map.getContainer().style.cursor = 'crosshair';
      const handler = (e) => {
        addPoint(e.latlng.lat, e.latlng.lng);
        map._addingStop = false;
        map.getContainer().style.cursor = '';
        map.off('click', handler);
      };
      map.on('click', handler);
    });

    $('#btn-clear').addEventListener('click', () => {
      points = [
        { id: uid(), name: '北京', lat: 39.9042, lng: 116.4074, type: 'start' },
        { id: uid(), name: '东京', lat: 35.6762, lng: 139.6503, type: 'end' }
      ];
      syncSegments();
      renderRoute();
      toast('路线已重置');
    });

    // Mobile menu
    $('#btn-menu').addEventListener('click', () => {
      $('#left-panel').classList.toggle('open');
    });

    // Init
    initMap();
    renderVehicles('all');
  </script>
</body>
</html>
